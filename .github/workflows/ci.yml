name: CI Pipeline

# Trigger on push/PR to main and develop branches
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  # Lint job - check code style
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --ignore-scripts
      
      - name: Run ESLint
        run: npm run lint -- --format json --output-file lint-report.json || true
        continue-on-error: true
      
      - name: Run TypeScript check
        run: npx tsc --noEmit
      
      - name: Upload lint report (artifacts)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: lint-report
          path: lint-report.json

  # Test job - run Jest tests with coverage
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --ignore-scripts
      
      - name: Run unit tests with coverage
        run: npm test -- --ci --watchAll=false --coverage --passWithNoTests
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/
      
      - name: Check coverage threshold (≥80%)
        run: |
          npx nyc report --check-coverage --lines 80 --functions 80 --branches 80 || true
        continue-on-error: true

  # Build job - build web and APK
  build:
    name: Build (Web + APK)
    runs-on: ubuntu-latest
    needs: lint
    environment: BUILD
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}
      
      - name: Install dependencies
        run: npm install --ignore-scripts
      
      - name: Verify Expo environment
        run: |
          npx expo-env-info
          npx expo-doctor@latest || true
      
      - name: Prebuild Android (verify native plugins)
        run: npx expo prebuild --platform android --no-install --clean
      
      - name: Verify SSL configuration
        run: |
          CONFIG_FILE="android/app/src/main/res/xml/network_security_config.xml"
          CERT_FILE="android/app/src/main/res/raw/domoticz.pem"
          
          echo "=== SSL Configuration Check ==="
          
          if [ ! -f "$CERT_FILE" ]; then
            echo "❌ Certificate not found: $CERT_FILE"
            exit 1
          fi
          echo "✅ Certificate present: $CERT_FILE"
          
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ network_security_config.xml not found: $CONFIG_FILE"
            exit 1
          fi
          echo "✅ network_security_config.xml present"
          
          if ! grep -q "domain-config" "$CONFIG_FILE"; then
            echo "❌ No <domain-config> in network_security_config.xml"
            exit 1
          fi
          echo "✅ <domain-config> present in network_security_config.xml"
          
          if ! grep -q "@raw/domoticz" "$CONFIG_FILE"; then
            echo "❌ Certificate @raw/domoticz not referenced"
            exit 1
          fi
          echo "✅ Certificate @raw/domoticz referenced"

  # SonarQube scan job
  sonarqube-scan:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [lint, test]
    environment: BUILD
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install --ignore-scripts
      
      - name: Run tests with coverage
        run: npm test -- --ci --watchAll=false --coverage --passWithNoTests
      
      - name: Download coverage report
        uses: actions/download-artifact@v3
        with:
          name: coverage-report
          path: coverage/
        continue-on-error: true
      
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Integration job - ensure all checks pass
  integration-check:
    name: Integration Check
    runs-on: ubuntu-latest
    needs: [lint, test, build, sonarqube-scan]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.sonarqube-scan.result }}" != "success" ]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
