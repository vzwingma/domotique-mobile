name: CI on all branches (DEPRECATED)

# ⚠️ DEPRECATED — remplacé par quick-check.yml (lint+test, branches hors main/develog)
# et ci.yml (pipeline complet, main/develop). Voir docs/adr/008-fusion-workflows-ci.md
# (Option B — scoping non-chevauchant).
#
# Ce fichier est volontairement neutralisé (déclenchement manuel uniquement) plutôt
# que supprimé, conformément à la règle de sécurité projet interdisant la suppression
# de fichiers par un agent (.claude/skills/safety-rules/SKILL.md). Un humain peut
# supprimer ce fichier via `git rm .github/workflows/build-on-all.yml` s'il le souhaite.
on:
  workflow_dispatch:

jobs:
  expo-build:
    name: Test and Build Expo App (deprecated, use ci.yml / quick-check.yml)
    runs-on: ubuntu-latest
    environment: BUILD
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}
      - name: 📦 Install dependencies
        run: npm install --ignore-scripts
      - name: Validate Expo environment
        run: npm run validate:expo
      - name: 🔧 Prebuild Android (vérifie les plugins natifs)
        run: npx expo prebuild --platform android --no-install --clean
      - name: ✅ Vérifier la configuration SSL (network_security_config.xml)
        run: |
          CONFIG_FILE="android/app/src/main/res/xml/network_security_config.xml"
          CERT_FILE="android/app/src/main/res/raw/domoticz.pem"

          echo "=== Vérification du certificat SSL ==="

          if [ ! -f "$CERT_FILE" ]; then
            echo "❌ Certificat introuvable : $CERT_FILE"
            exit 1
          fi
          echo "✅ Certificat présent : $CERT_FILE"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ network_security_config.xml introuvable : $CONFIG_FILE"
            exit 1
          fi
          echo "✅ network_security_config.xml présent"

          if ! grep -q "domain-config" "$CONFIG_FILE"; then
            echo "❌ Aucun <domain-config> dans network_security_config.xml — le domaine Domoticz n'est pas configuré dans app.json"
            echo "--- Contenu actuel ---"
            cat "$CONFIG_FILE"
            exit 1
          fi
          echo "✅ <domain-config> présent dans network_security_config.xml"

          if ! grep -q "@raw/domoticz" "$CONFIG_FILE"; then
            echo "❌ Le certificat @raw/domoticz n'est pas référencé dans network_security_config.xml"
            cat "$CONFIG_FILE"
            exit 1
          fi
          echo "✅ Certificat @raw/domoticz référencé"

          echo "--- Contenu network_security_config.xml ---"
          cat "$CONFIG_FILE"
      - name: 🧪 Run unit tests
        run: npm test -- --ci --watchAll=false --coverage
      - name: 🔎 SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
