name: Quick Check

# Feedback rapide (lint + test) sur les branches de feature.
# Le pipeline complet (build, Sonar, integration-check) reste sur ci.yml
# pour main/develop — cf. docs/adr/008-fusion-workflows-ci.md (Option B).
on:
  push:
    branches-ignore:
      - main
      - develop
  pull_request:
    branches-ignore:
      - main
      - develop
  workflow_dispatch:

jobs:
  quick-check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --ignore-scripts

      - name: 🧹 Run ESLint
        run: npm run lint

      - name: 🧪 Run unit tests
        run: npm test -- --ci --watchAll=false --coverage --passWithNoTests
