sonar.projectKey=vzwingma_domotique-mobile
sonar.organization=vzwingma-github

sonar.sources=app,components,hooks
sonar.tests=app,components,hooks
sonar.test.inclusions=**/__tests__/**/*,**/*.test.ts,**/*.test.tsx,**/*-test.ts,**/*-test.tsx
sonar.exclusions=**/*.d.ts,**/coverage/**,**/node_modules/**,**/__tests__/**
sonar.coverage.exclusions=node_modules/**,**/__tests__/**,**/coverage/**,**/*.test.ts,**/*.test.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Quality gate configuration
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Code coverage settings
sonar.coverage.reportPaths=coverage/
sonar.javascript.coverage.itReportPaths=coverage/
